name: Server CD - Docker Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-deploy.yml'
  workflow_dispatch: # GitHub UI에서 수동 실행 가능

jobs:
  # ── 1단계: 기존 CI 검사 ───────────────────────────────────────
  lint-and-build:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/t_lecture_test
      DIRECT_URL: postgresql://test:test@localhost:5432/t_lecture_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: ESLint Check
        run: npm run lint

      - name: Build
        run: npm run build

  # ── 2단계: Docker 이미지 빌드 후 Docker Hub 업로드 ──────────────
  docker-publish:
    name: Docker Build & Push
    needs: lint-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 메타데이터 설정 (태그 자동 생성)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: naktan/t-lecture-server
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── 3단계: Render 재배포 트리거 ─────────────────────────────────
  deploy-to-render:
    name: Deploy to Render
    needs: docker-publish
    runs-on: ubuntu-latest

    steps:
      - name: Render 배포 훅 호출
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -o /dev/null -w "HTTP Status: %{http_code}\n"
